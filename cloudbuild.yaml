substitutions:
  _REGION: europe-southwest1
  _REPOSITORY: etiquetas-prom
  _IMAGE: email-worker
  _JOB: etiquetas-prom-email-worker
  _RUNTIME_SERVICE_ACCOUNT: cloud-run-campaign-worker@etiquetas-prom-prod.iam.gserviceaccount.com

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - Dockerfile.cloudrun-worker
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:$SHORT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:latest
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:$SHORT_SHA

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:latest

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - jobs
      - deploy
      - ${_JOB}
      - --image
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:$SHORT_SHA
      - --region
      - ${_REGION}
      - --service-account
      - ${_RUNTIME_SERVICE_ACCOUNT}
      - --tasks
      - "1"
      - --parallelism
      - "1"
      - --max-retries
      - "0"
      - --task-timeout
      - "15m"
      - --cpu
      - "1"
      - --memory
      - "2Gi"
      - --set-env-vars
      - NODE_ENV=production,AUTOMATIC_CAMPAIGN_BUCKET=automatic-campaign-pdfs,AUTOMATIC_CAMPAIGN_HISTORY_DAYS=5,AUTOMATIC_CAMPAIGN_CLEANUP_ENABLED=1,AUTOMATIC_CAMPAIGN_CLEANUP_DAYS=5,AUTOMATIC_CAMPAIGN_CLEANUP_BATCH_SIZE=100,CAMPAIGN_STORE_RAW_EMAIL=0,CAMPAIGN_PDF_ENGINE=playwright,CAMPAIGN_PDF_ALLOW_APPROX_FALLBACK=0,CAMPAIGN_DEDUPE_BY_SUBJECT=1,CAMPAIGN_DEDUPE_ENABLED=1,CAMPAIGN_DEFAULT_FORMAT=automatico,CAMPAIGN_DEFAULT_TITLE=PROMOÇÃO,CAMPAIGN_EMAIL_API_DEBUG=0,CAMPAIGN_EMAIL_API_TIMEOUT_MS=30000,CAMPAIGN_EMAIL_DEBUG=0,CAMPAIGN_EMAIL_FROM=,CAMPAIGN_EMAIL_FROM_ADDRESS=Etiquetas Promo <onboarding@resend.dev>,CAMPAIGN_EMAIL_MARK_SEEN=1,CAMPAIGN_EMAIL_MAX_MESSAGES=2,CAMPAIGN_EMAIL_PROVIDER=resend,CAMPAIGN_EMAIL_REPLY_TO=etiquetasprom@gmail.com,CAMPAIGN_EMAIL_SCAN_LIMIT=20,CAMPAIGN_EMAIL_SEEN_ONLY=0,CAMPAIGN_EMAIL_SEND_ENABLED=1,CAMPAIGN_EMAIL_SUBJECT_INCLUDES=Resumo,CAMPAIGN_EMAIL_UNSEEN_ONLY=1,CAMPAIGN_EMAIL_WORKER_ENABLED=0,CAMPAIGN_EMAIL_WORKER_RUN_ON_START=0,CAMPAIGN_EMAIL_WORKER_INTERVAL_MS=300000,CAMPAIGN_IMAP_AUTO_DISCOVER_MAILBOXES=0,CAMPAIGN_IMAP_HOST=imap.gmail.com,CAMPAIGN_IMAP_MAILBOX=INBOX,CAMPAIGN_IMAP_MAILBOXES=INBOX,CAMPAIGN_IMAP_PORT=993,CAMPAIGN_IMAP_SECURE=1,CAMPAIGN_IMAP_USER=etiquetasprom@gmail.com,CAMPAIGN_REPROCESS_ERRORED=1,CAMPAIGN_STORE_EMAIL_ANGRA=simaopereira308@gmail.com,CAMPAIGN_STORE_EMAIL_PRAIA=simaopereira308@gmail.com,CAMPAIGN_STORE_EMAIL_VALADOS=simaopereira308@gmail.com,CAMPAIGN_TITLE_FROM_EMAIL=0,WARM_ARTICLES_CACHE=0
      - --set-secrets
      - CAMPAIGN_IMAP_PASS=campaign-imap-pass:latest,RESEND_API_KEY=resend-api-key:latest,SUPABASE_URL=supabase-url:latest,SUPABASE_SERVICE_ROLE_KEY=supabase-service-role-key:latest,SUPABASE_PUBLISHABLE_KEY=supabase-publishable-key:latest


options:
  logging: CLOUD_LOGGING_ONLY