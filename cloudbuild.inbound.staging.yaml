# Cloud Build: Cloud Run Service de STAGING para Resend Inbound.
# Importante: este ficheiro é para webhook HTTP. Não confundir com cloudbuild.staging.yaml,
# que faz deploy de um Cloud Run Job/worker.

substitutions:
  _REGION: europe-southwest1
  _REPOSITORY: etiquetas-prom
  _IMAGE: email-inbound-service-staging
  _SERVICE: etiquetas-prom-inbound-webhook-staging
  _RUNTIME_SERVICE_ACCOUNT: cloud-run-campaign-worker-staging@etiquetas-prom-prod.iam.gserviceaccount.com
  # Obrigatório no trigger ou no submit manual. Deixar vazio apenas para primeiro deploy técnico.
  _DEFAULT_ORGANIZATION_ID: ""
  # Usar endereço/domínio validado no Resend staging quando existir.
  _EMAIL_FROM_ADDRESS: "Etiquetas Promo Staging <onboarding@resend.dev>"
  _EMAIL_REPLY_TO: "simaopereira308@gmail.com"

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - Dockerfile.cloudrun-inbound
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:$SHORT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:latest
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:$SHORT_SHA

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:latest

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:$SHORT_SHA
      - --region
      - ${_REGION}
      - --service-account
      - ${_RUNTIME_SERVICE_ACCOUNT}
      - --allow-unauthenticated
      - --cpu
      - "1"
      - --memory
      - "2Gi"
      - --timeout
      - "900"
      - --concurrency
      - "1"
      - --max-instances
      - "2"
      - --set-env-vars
      - NODE_ENV=staging,WARM_ARTICLES_CACHE=0,CAMPAIGN_EMAIL_WORKER_ENABLED=0,CAMPAIGN_EMAIL_WORKER_RUN_ON_START=0,CAMPAIGN_RESEND_INBOUND_ENABLED=1,AUTOMATIC_CAMPAIGN_BUCKET=automatic-campaign-pdfs-staging,AUTOMATIC_CAMPAIGN_HISTORY_DAYS=5,AUTOMATIC_CAMPAIGN_CLEANUP_ENABLED=1,AUTOMATIC_CAMPAIGN_CLEANUP_DAYS=5,AUTOMATIC_CAMPAIGN_CLEANUP_BATCH_SIZE=100,CAMPAIGN_STORE_RAW_EMAIL=0,CAMPAIGN_DEFAULT_ORGANIZATION_ID=${_DEFAULT_ORGANIZATION_ID},CAMPAIGN_PDF_ENGINE=playwright,CAMPAIGN_PDF_ALLOW_APPROX_FALLBACK=0,CAMPAIGN_DEDUPE_BY_SUBJECT=1,CAMPAIGN_DEDUPE_ENABLED=1,CAMPAIGN_DEFAULT_FORMAT=automatico,CAMPAIGN_DEFAULT_TITLE=PROMOÇÃO,CAMPAIGN_EMAIL_API_DEBUG=0,CAMPAIGN_EMAIL_API_TIMEOUT_MS=30000,CAMPAIGN_EMAIL_DEBUG=0,CAMPAIGN_EMAIL_FROM_ADDRESS=${_EMAIL_FROM_ADDRESS},CAMPAIGN_EMAIL_REPLY_TO=${_EMAIL_REPLY_TO},CAMPAIGN_EMAIL_MARK_SEEN=0,CAMPAIGN_EMAIL_MAX_MESSAGES=1,CAMPAIGN_EMAIL_PROVIDER=resend,CAMPAIGN_EMAIL_SCAN_LIMIT=10,CAMPAIGN_EMAIL_SEND_ENABLED=0,CAMPAIGN_REPROCESS_ERRORED=1,CAMPAIGN_TITLE_FROM_EMAIL=0,RESEND_INBOUND_ALWAYS_FETCH=1
      - --set-secrets
      - SUPABASE_URL=supabase-url-staging:latest,SUPABASE_PUBLISHABLE_KEY=supabase-publishable-key-staging:latest,SUPABASE_SERVICE_ROLE_KEY=supabase-service-role-key-staging:latest,RESEND_API_KEY=resend-api-key-staging:latest,RESEND_WEBHOOK_SECRET=resend-webhook-secret-staging:latest,CAMPAIGN_STORE_EMAIL_ANGRA=campaign-store-email-angra-staging:latest,CAMPAIGN_STORE_EMAIL_PRAIA=campaign-store-email-praia-staging:latest,CAMPAIGN_STORE_EMAIL_VALADOS=campaign-store-email-valados-staging:latest

options:
  logging: CLOUD_LOGGING_ONLY
